version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: enem_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: enem_db
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql

  etl:
    build: .
    container_name: enem_etl
    depends_on:
      - db
    volumes:
      - ./dados:/app/dados
      - ./etl.py:/app/etl.py
    environment:
      - SPARK_HOME=/opt/spark
      - MYSQL_HOST=db
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
      - MYSQL_DB=enem_db

volumes:
  mysql_data:
